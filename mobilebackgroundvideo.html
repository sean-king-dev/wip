<div class="mobile-background-video">
    [[mobileBackgroundVideo? &video=`[[+video]]`]]
    <iframe id="vimeoIframe2" src="about:blank" title="[[+title:default=`Ambient Video`]]" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen" allowfullscreen></iframe>
</div>

<script>
    function loadVimeoPlayerScriptMobile() {
        return new Promise((resolve, reject) => {
            if (window.Vimeo) {
                resolve();
            } else {
                const script = document.createElement('script');
                script.src = 'https://player.vimeo.com/api/player.js';
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            }
        });
    }

    loadVimeoPlayerScriptMobile().then(() => {
        const iframe = document.getElementById('vimeoIframe2');
        const mobileVideoURL = '[[+mobile_background_video]]?background=1';
        iframe.src = mobileVideoURL;
    }).catch(error => {
        console.error('Failed to load Vimeo Player API script:', error);
    });
</script>
