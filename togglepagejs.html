
<script>
window.addEventListener("DOMContentLoaded", function () {
    const undergradBtn = document.getElementById("undergradBtn")
    const gradBtn = document.getElementById("gradBtn");

    const ugMenuLinks = document.querySelector(".ug-menu-links");
    const gMenuLinks = document.querySelector(".g-menu-links");

    const ugSection = document.querySelector(".undergrad-section");
    const gSection = document.querySelector(".grad-section");

    function showUndergrad() {
      ugMenuLinks.classList.add("active");
      gMenuLinks.classList.remove("active");
      ugSection.classList.add("active");
      gSection.classList.remove("active");
      undergradBtn.classList.add("active");
      gradBtn.classList.remove("active");
      console.log("showUndergrad clicked!");
    }

    showUndergrad();

    function showGrad() {
      gMenuLinks.classList.add("active");
      ugMenuLinks.classList.remove("active");
      gSection.classList.add("active");
      ugSection.classList.remove("active");
      gradBtn.classList.add("active");
      undergradBtn.classList.remove("active");
      console.log("showGrad clicked!");
    }

    showGrad();

    undergradBtn.addEventListener("click", showUndergrad);
    gradBtn.addEventListener("click", showGrad);

    // Default view
    showUndergrad();

    // Optional: smooth scrolling
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener("click", function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute("href"));
        if (target) {
          target.scrollIntoView({ behavior: "smooth" });
        }
      });
    });


    // switch between undergrad and grad sections

    function toggleSection () {
      const gradActive = document.querySelectorAll(".p#gradBtn.active");
      const undergradSectionToggle = document.querySelectorAll(".undergrad-section-toggle");
      if(gradActive.length > 0) {
        undergradSectionToggle.forEach(el => {
          // el.style.display = "none";
           el.style.border = "2px solid green";
        });
      } else {
        undergradSectionToggle.forEach(el => {
          // el.style.display = "block";
           el.style.border = "2px solid red";
        })
      }
    }

    toggleSection();


  });
</script>
