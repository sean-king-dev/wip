<style>
    @media screen and (max-width:1024px) {
        .toggle-section {
      border: 1px solid red;
      width: 200px;
      padding: 10px;
    }

    .kpu-uni-toggle {
      background: #aaa;
      color: #fff;
      font-family: sans-serif;
      padding: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
    }

    .kpu-uni-toggle div {
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 4px;
    }

    .kpu-uni-toggle div.active {
      background: #555;
    }

    .undergrad-options,
    .grad-options {
      margin-top: 1rem;
      display: none;
    }

    .undergrad-options {
      border: 2px solid dodgerblue;
    }

    .grad-options {
      border: 2px solid limegreen;
    }

    button {
      width: 48%;
      margin: 2px 0;
    }


.switch {
  position: relative;
  display: inline-block;
  width: 60px;
  height: 34px;
}

.switch input { 
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  -webkit-transition: .4s;
  transition: .4s;
}

.slider:before {
  position: absolute;
  content: "";
  height: 26px;
  width: 26px;
  left: 4px;
  bottom: 4px;
  background-color: white;
  -webkit-transition: .4s;
  transition: .4s;
}

input:checked + .slider {
  background-color: #2196F3;
}

input:focus + .slider {
  box-shadow: 0 0 1px #2196F3;
}

input:checked + .slider:before {
  -webkit-transform: translateX(26px);
  -ms-transform: translateX(26px);
  transform: translateX(26px);
}

.slider.round {
  border-radius: 34px;
}

.slider.round:before {
  border-radius: 50%;
}

.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 24px;
  margin: 0 10px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: #ccc;
  transition: 0.4s;
  border-radius: 24px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: 0.4s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: #00f;
}

input:checked + .slider:before {
  transform: translateX(26px);
}

.toggle-label {
  font-family: sans-serif;
  color: #00f;
  font-weight: normal;
  transition: color 0.3s, font-weight 0.3s;
}

.toggle-label.active-label {
  color: #0f0;
  font-weight: bold;
}

#toggle-section-2 {
  border: 2px solid black;
  display: flex;
  flex-direction: column;
}

.toggle-2 .kpu-uni-toggle {
  display: flex;
  flex-direction: column;
  gap: 8px; 
}

.toggle-2 .toggle-btn {
  display: flex;
  justify-content: space-around;
  align-items: center;
  width: 100%;
  padding: 5px 10px;
  background: #aaa;
  border-radius: 4px;
}

.toggle-2 .toggle-btn .switch {
  margin-right: auto; /* pushes the switch to the right */
}

.toggle-2 .toggle-btn.active {
  background: #555;
}


#ug-tog-2 {
  border: 1px solid red;
  width: 90%;
}

#ug-tog-2.slider.round {
  border: 1px solid red;
}

#g-tog-2 {
  border: 1px solid blue;
  width: 90%;
}

    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        document.querySelector('.undergrad-options-1').style.display = 'block';
document.querySelector('.undergrad-options-2').style.display = 'block';
document.querySelector('.undergrad-options-3').style.display = 'block';

function buttonActive(type, group) {
  const ugBtn = document.getElementById(`ug-tog-${group}`);
  const gBtn = document.getElementById(`g-tog-${group}`);
  const ugOptions = document.querySelector(`.undergrad-options-${group}`);
  const gOptions = document.querySelector(`.grad-options-${group}`);

  if (type === 'undergrad') {
    ugBtn.classList.add('active');
    gBtn.classList.remove('active');
    ugOptions.style.display = 'block';
    gOptions.style.display = 'none';
  } else if (type === 'grad') {
    gBtn.classList.add('active');
    ugBtn.classList.remove('active');
    gOptions.style.display = 'block';
    ugOptions.style.display = 'none';
  }
}

function sliderToggle() {
  const slider = document.getElementById('main-slider');
  const ugOptions = document.querySelector('.undergrad-options-3');
  const gOptions = document.querySelector('.grad-options-3');

  if (slider.checked) {
    ugOptions.style.display = 'none';
    gOptions.style.display = 'block';
  } else {
    // Undergrad
    ugOptions.style.display = 'block';
    gOptions.style.display = 'none';
  }
}
document.querySelector('.undergrad-options-1').style.display = 'block';
document.querySelector('.undergrad-options-2').style.display = 'block';
document.querySelector('.undergrad-options-3').style.display = 'block';

function buttonActive(type, group) {
  const ugBtn = document.getElementById(`ug-tog-${group}`);
  const gBtn = document.getElementById(`g-tog-${group}`);
  const ugOptions = document.querySelector(`.undergrad-options-${group}`);
  const gOptions = document.querySelector(`.grad-options-${group}`);

  if (type === 'undergrad') {
    ugBtn.classList.add('active');
    gBtn.classList.remove('active');
    ugOptions.style.display = 'block';
    gOptions.style.display = 'none';
  } else if (type === 'grad') {
    gBtn.classList.add('active');
    ugBtn.classList.remove('active');
    gOptions.style.display = 'block';
    ugOptions.style.display = 'none';
  }
}

function sliderToggle() {
  const slider = document.getElementById('main-slider');
  const ugOptions = document.querySelector('.undergrad-options-3');
  const gOptions = document.querySelector('.grad-options-3');
  const ugLabel = document.getElementById('ug-label-3');
  const gLabel = document.getElementById('g-label-3');

  if (slider.checked) {
    ugOptions.style.display = 'none';
    gOptions.style.display = 'block';
    ugLabel.classList.remove('active-label');
    gLabel.classList.add('active-label');
  } else {
    ugOptions.style.display = 'block';
    gOptions.style.display = 'none';
    gLabel.classList.remove('active-label');
    ugLabel.classList.add('active-label');
  }
}

// for toggle 2 interaction
function setupToggle2Sliders() {
  const ugSlider = document.getElementById('ug-slider-2');
  const gSlider = document.getElementById('g-slider-2');
  const ugBtn = document.getElementById('ug-tog-2');
  const gBtn = document.getElementById('g-tog-2');
  const ugOptions = document.querySelector('.undergrad-options-2');
  const gOptions = document.querySelector('.grad-options-2');

  ugSlider.addEventListener('change', () => {
    if (ugSlider.checked) {
      gSlider.checked = false; // turn off Grad
      ugBtn.classList.add('active');
      gBtn.classList.remove('active');
      ugOptions.style.display = 'block';
      gOptions.style.display = 'none';
    } else {
      // If undergrad slider is off, default to grad on
      gSlider.checked = true;
      gBtn.classList.add('active');
      ugBtn.classList.remove('active');
      gOptions.style.display = 'block';
      ugOptions.style.display = 'none';
    }
  });

  gSlider.addEventListener('change', () => {
    if (gSlider.checked) {
      ugSlider.checked = false; // turn off Undergrad
      gBtn.classList.add('active');
      ugBtn.classList.remove('active');
      gOptions.style.display = 'block';
      ugOptions.style.display = 'none';
    } else {
      // If grad slider is off, default to undergrad on
      ugSlider.checked = true;
      ugBtn.classList.add('active');
      gBtn.classList.remove('active');
      ugOptions.style.display = 'block';
      gOptions.style.display = 'none';
    }
  });
}

// Call this after the DOM loads
setupToggle2Sliders();

    });
</script>
