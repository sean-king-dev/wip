
<div id="kuSearchDropdown" class="ku-search-dropdown" style="display:none;">
    <div class="gn-search-input-wrap">
        <i class="fas fa-search"></i>

        <input 
            type="text"
            id="kuNavFilter"
            placeholder="Search..."
            class="kuNavFilterDropdown gn-search-input"
        >

        <i class="fas fa-times-circle search-reset-icon" id="kuClearSearch"></i>
    </div>

    <ul class="ku-child-links" id="kuChildList">
        [[!pdoResources?
            &parents=`15234`
            &depth=`1`
            &limit=`0`
            &sortby=`menuindex`
            &sortdir=`ASC`
            &tpl=`KuNavChildTpl`
            &showHidden=`0`
        ]]
    </ul>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

    const dropdown = document.getElementById("kuSearchDropdown");
    const input = document.getElementById("kuNavFilter");
    const list = document.getElementById("kuChildList");
    const clearBtn = document.getElementById("kuClearSearch");

    if (!dropdown || !input || !list) return;

    // Store FULL original dropdown state
    const originalListHTML = list.innerHTML;

    let selectedIndex = -1;
    let items = Array.from(list.querySelectorAll("li"));

    window.toggleKuSearch = function () {
        dropdown.style.display =
            dropdown.style.display === "none" ? "block" : "none";

        if (dropdown.style.display === "block") {
            input.focus();
        }
    };

    function getVisibleItems() {
        return Array.from(list.querySelectorAll("li"))
            .filter(item => item.style.display !== "none");
    }

    function filterList() {
        const filter = input.value.trim().toLowerCase();
        selectedIndex = -1;

        items = Array.from(list.querySelectorAll("li"));

        items.forEach(item => {
            const link = item.querySelector("a");
            if (!link) return;

            const text = link.textContent.toLowerCase();

            item.classList.remove("ku-selected");

            if (text.includes(filter)) {
                item.style.display = "";
            } else {
                item.style.display = "none";
            }
        });

        autoSelectFirst();
    }

    function autoSelectFirst() {
        const visible = getVisibleItems();
        if (visible.length > 0) {
            selectedIndex = 0;
            visible[0].classList.add("ku-selected");
        }
    }

    input.addEventListener("input", filterList);

    input.addEventListener("keydown", function (e) {

        const visible = getVisibleItems();
        if (!visible.length) return;

        if (e.key === "ArrowDown") {
            e.preventDefault();
            selectedIndex = (selectedIndex + 1) % visible.length;
        }

        if (e.key === "ArrowUp") {
            e.preventDefault();
            selectedIndex =
                (selectedIndex - 1 + visible.length) % visible.length;
        }

        if (e.key === "Enter") {
            e.preventDefault();
            const link = visible[selectedIndex]?.querySelector("a");
            if (link) window.location.href = link.href;
        }

        visible.forEach(item => item.classList.remove("ku-selected"));
        visible[selectedIndex]?.classList.add("ku-selected");
    });

    // CLEAR = restore original dropdown exactly
    clearBtn.addEventListener("click", function () {

        input.value = "";
        selectedIndex = -1;

        list.innerHTML = originalListHTML;   // FULL RESET
        items = Array.from(list.querySelectorAll("li"));

        input.focus();
    });
   
    function isMobile() {
    return window.matchMedia("(max-width: 768px)").matches;
}
 
document.querySelectorAll(".mega-menu .mobile-menu a[data-menu]")
.forEach(function (link) {
 
    link.addEventListener("click", function (e) {
 
        if (!isMobile()) return;
 
        e.preventDefault();
 
        const menuName = this.getAttribute("data-menu");
 
        const allPanels = document.querySelectorAll(".mega-menu .content[data-menu]");
 
        // Hide all
        allPanels.forEach(panel => {
            panel.classList.remove("active");
            panel.style.display = "none";
        });
 
        // Show matching
        const target = document.querySelector(
            `.mega-menu .content[data-menu="${menuName}"]`
        );
 
        if (target) {
            target.classList.add("active");
            target.style.display = "block";
        }
    });
 
});

});
</script>
